# Place `.env.production` next to this file on the server (not committed to git).
# NEXT_PUBLIC_* vars must be present at image build time; server-only vars can be set via env_file at runtime.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-web:latest
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "3000"
    networks:
      - app

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - app

networks:
  app:
    driver: bridge
