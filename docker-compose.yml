# Place `.env.production` next to this file on the server (not committed to git).
# NEXT_PUBLIC_* vars must be present at image build time; server-only vars can be set via env_file at runtime.
#
# AWS ALB (SysOps):
# - Preferred: target group protocol HTTP, port 80 → this compose as-is (TLS only on the ALB).
# - If they require HTTPS to port 443 on the instance: generate certs (scripts/generate-nginx-internal-certs.sh),
#   then switch nginx to docker/nginx/default-alb.conf, publish 443, and mount docker/nginx/ssl — see comments on `nginx` below.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-web:latest
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "3000"
    networks:
      - app

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    # Bind on all interfaces so traffic to the host (DNS → test.softco.com) reaches this container.
    # If host port 80 is taken by system nginx, set NGINX_HTTP_PORT=8080 in the environment or `.env`.
    ports:
      - "0.0.0.0:${NGINX_HTTP_PORT:-80}:80"
      # ALB HTTPS target to origin: uncomment after certs exist under docker/nginx/ssl/
      # - "0.0.0.0:443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # ALB HTTPS target: replace line above with default-alb.conf and mount TLS (do not mix with plain default.conf + 443 publish)
      # - ./docker/nginx/default-alb.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - app

networks:
  app:
    driver: bridge
