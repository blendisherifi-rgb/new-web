# Behind an AWS ALB: the ALB terminates HTTPS for clients and usually connects to targets over HTTP.
# Preserve X-Forwarded-Proto from the ALB so Next.js sees https:// for the original request.
# "Force HTTPS": when the ALB says the client used HTTP, redirect to https:// (same Host).
# Direct access (no X-Forwarded-Proto) does not redirect — SSM/curl to localhost still works.

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_proto $redirect_to_https {
    http 1;
    default 0;
}

server {
    listen 80 default_server;
    # Host is usually your public domain from the ALB; private IP matching is optional.
    server_name 10.122.9.33 _;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        if ($redirect_to_https) {
            return 301 https://$host$request_uri;
        }

        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
