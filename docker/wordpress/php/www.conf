[www]
user  = www-data
group = www-data

listen = 127.0.0.1:9000

pm                   = dynamic
pm.max_children      = 25
pm.start_servers     = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests      = 500

; Send worker stdout/stderr to main logs
catch_workers_output   = yes
decorate_workers_output = no

; Pass through environment variables (needed for wp-config.php getenv() calls)
clear_env = no
