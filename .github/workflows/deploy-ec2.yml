# Deploy to EC2: secrets EC2_HOST, EC2_USER, EC2_SSH_KEY (private key PEM).
# GitHub-hosted runners must reach the SSH target (public IP, bastion, VPN, or use a self-hosted runner in the VPC).
# On the server: Docker + Compose plugin, clone repo to APP_PATH, add .env.production.

name: Deploy to EC2 (Docker)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /var/www/new-web
            git fetch origin main
            git checkout main
            git pull origin main
            docker compose build --pull
            docker compose up -d --remove-orphans
            docker image prune -f
